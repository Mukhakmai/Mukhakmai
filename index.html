<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مخك معي؟ 🧠</title>
    
    <link rel="icon" href="favicon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #8e44ad; --secondary: #f39c12; --success: #27ae60; --danger: #e74c3c; 
            --bg-color: #f8fafc; --card-bg: #ffffff; --text-main: #2c3e50; 
            --border-color: #e2e8f0; --nav-bg: #ffffff;
        }

        /* منع مشاكل العرض في سفاري وقوقل جوال */
        html, body { width: 100%; overflow-x: hidden; margin: 0; padding: 0; -webkit-text-size-adjust: 100%; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg-color); color: var(--text-main); padding-top: 140px; /* مساحة كافية للهيدر في الجوال */ }

        /* Navbar المطور - حل مشكلة التداخل */
        .navbar { 
            background: var(--nav-bg); 
            box-shadow: 0 2px 15px rgba(0,0,0,0.1); 
            position: fixed; 
            top: 0; 
            width: 100%; 
            z-index: 5000; 
            padding: 10px; 
            box-sizing: border-box; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 10px; 
        }
        
        .logo img { height: 40px; width: auto; }
        
        .nav-links { 
            display: flex; 
            gap: 5px; 
            width: 100%; 
            justify-content: center; 
            flex-wrap: wrap; 
        }
        
        .nav-btn { 
            background: #f1f5f9; 
            border: none; 
            font-family: 'Tajawal'; 
            font-weight: 700; 
            cursor: pointer; 
            padding: 8px 12px; 
            border-radius: 10px; 
            color: var(--text-main); 
            font-size: 0.85em; 
            flex: 1; 
            max-width: 90px; 
            text-align: center;
            transition: 0.3s;
        }
        
        .nav-btn.active { background: var(--primary); color: white; }
        
        .btn-play-nav { 
            background: linear-gradient(45deg, var(--secondary), #d35400); 
            color: white !important; 
            border-radius: 15px; 
            width: 100%; 
            max-width: 350px;
            padding: 12px; 
            font-weight: 900; 
            border: none; 
            cursor: pointer; 
            text-align: center;
            box-shadow: 0 4px 10px rgba(243, 156, 18, 0.3);
        }

        /* شاشات الكمبيوتر */
        @media (min-width: 768px) {
            body { padding-top: 90px; }
            .navbar { flex-direction: row; padding: 10px 40px; height: 80px; justify-content: space-between; }
            .logo { width: auto; }
            .nav-links { width: auto; gap: 15px; }
            .btn-play-nav { width: auto; padding: 10px 30px; }
            .nav-btn { max-width: none; flex: none; padding: 10px 20px; }
        }

        .container { width: 100%; max-width: 800px; margin: 0 auto; padding: 15px; box-sizing: border-box; }
        .hidden { display: none !important; }
        
        .auth-box { 
            background: var(--card-bg); 
            padding: 25px; 
            border-radius: 25px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            border: 1px solid var(--border-color); 
            text-align: center; 
            margin-bottom: 20px; 
            width: 100%;
            box-sizing: border-box;
        }
        
        /* تحسين شبكة الفئات للجوال */
        .categories-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
            margin-top: 10px; 
        }
        
        .category-card { 
            background: var(--card-bg); 
            padding: 25px 10px; 
            border-radius: 20px; 
            border: 2px solid var(--border-color); 
            text-align: center; 
            cursor: pointer; 
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* تحسين شاشة حسابي المكتومة في الصورة */
        .profile-data-card {
            background: #f1f5f9;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: right;
        }
        .profile-data-card p { margin: 10px 0; font-size: 1.1em; }

        input, select, textarea { 
            width: 100%; 
            padding: 14px; 
            margin: 8px 0; 
            border: 2px solid #e2e8f0; 
            border-radius: 12px; 
            font-family: 'Tajawal'; 
            font-size: 16px; /* مهم جداً لمنع زووم سفاري */
            box-sizing: border-box; 
        }
        
        .btn-main { 
            width: 100%; 
            padding: 15px; 
            font-weight: 900; 
            border: none; 
            border-radius: 15px; 
            cursor: pointer; 
            color: white; 
            margin-top: 10px; 
            font-family: 'Tajawal';
            font-size: 1.1em;
        }

        /* المعاينة */
        .preview-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 600px) { .preview-grid { grid-template-columns: 1fr 1fr; } }
    </style>

    <script>
        window.switchTab = (tabId) => {
            document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            const target = document.getElementById(`view-${tabId}`);
            if(target) {
                target.classList.remove('hidden');
                localStorage.setItem('activeTab', tabId);
            }
            const activeBtn = document.getElementById(`tab-${tabId}`);
            if(activeBtn) activeBtn.classList.add('active');
        };
    </script>
</head>
<body>

<nav class="navbar">
    <div class="logo" onclick="window.switchTab('home')" style="cursor: pointer;">
        <img src="logo-clean.png" alt="مخك معي">
    </div>
    <div class="nav-links">
        <button class="nav-btn" id="tab-home" onclick="window.switchTab('home')">الرئيسية</button>
        <button class="nav-btn hidden" id="tab-admin" onclick="window.switchTab('admin')">الإدارة</button>
        <button class="nav-btn" id="tab-auth" onclick="window.switchTab('auth')">حسابي</button>
    </div>
    <button class="btn-play-nav" onclick="window.checkSubscriptionAndPlay()">العب الآن 🚀</button>
</nav>

<div id="view-home" class="container fade-in">
    <div class="categories-grid" id="home-categories-preview"></div>
</div>

<div id="view-auth" class="container hidden fade-in">
    <div class="auth-box" id="logged-out-view">
        <h3>تسجيل الدخول 👋</h3>
        <div id="login-form">
            <input type="email" id="login-email" placeholder="البريد الإلكتروني">
            <input type="password" id="login-password" placeholder="كلمة المرور">
            <button class="btn-main" style="background:var(--primary)" onclick="window.handleLogin()">دخول</button>
            <p>ليس لديك حساب؟ <a href="#" onclick="window.toggleAuth(true)">سجل الآن</a></p>
        </div>
        <div id="signup-form" class="hidden">
            <input type="email" id="signup-email" placeholder="البريد الإلكتروني">
            <input type="password" id="signup-password" placeholder="كلمة المرور">
            <button class="btn-main" style="background:var(--secondary)" onclick="window.handleSignup()">إنشاء حساب</button>
            <p>لديك حساب؟ <a href="#" onclick="window.toggleAuth(false)">دخول</a></p>
        </div>
    </div>
    
    <div class="auth-box hidden" id="logged-in-view">
        <div class="profile-data-card">
            <p><b>البريد:</b> <span id="u-email"></span></p>
            <p><b>الاشتراك:</b> <span id="u-sub-status">...</span></p>
        </div>
        <button class="btn-main" style="background:var(--danger)" onclick="window.handleLogout()">تسجيل الخروج 🚪</button>
    </div>
</div>

<div id="view-game" class="container hidden fade-in">
    <div id="step-select-category">
        <h3 style="text-align: center;">اختر الفئات للتحدي</h3>
        <div class="categories-grid" id="pro-categories-grid"></div>
        <button id="btn-confirm-categories" class="btn-main hidden" style="background:var(--secondary)" onclick="window.proceedToSettings()">متابعة للفرق ➡️</button>
    </div>
    <div id="step-game-settings" class="hidden">
        <div class="auth-box">
            <input type="text" id="team1-name-input" placeholder="اسم الفريق 1">
            <input type="text" id="team2-name-input" placeholder="اسم الفريق 2">
            <button class="btn-main" style="background:var(--primary)" onclick="window.finalizeSetupAndPlay()">ابدأ 🚀</button>
        </div>
    </div>
</div>

<div id="view-admin" class="container hidden fade-in">
    <div class="auth-box">
        <h4>📁 الفئات والرفع</h4>
        <input type="text" id="bulk-cat-name" placeholder="اسم الفئة">
        <textarea id="bulk-data" rows="4" placeholder='الصق كود الأسئلة هنا...'></textarea>
        <button class="btn-main" style="background:#27ae60;" onclick="window.processBulkUpload()">رفع الأسئلة ✅</button>
        <button class="btn-main" style="background:var(--danger);" onclick="window.deleteCategoryQuestions()">مسح الفئة 🗑️</button>
    </div>
    <div class="auth-box"><h4>📋 قائمة الفئات</h4><div id="admin-qs-list"></div></div>
</div>

<div id="view-preview" class="container hidden fade-in">
    <div class="auth-box" style="display:flex; justify-content:space-between; align-items:center; padding:15px;">
        <b id="preview-title">...</b>
        <button class="nav-btn" style="background:var(--danger); color:white; max-width:none;" onclick="window.switchTab('admin')">رجوع ⬅️</button>
    </div>
    <div id="preview-questions-grid" class="preview-grid"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, getDoc, setDoc, updateDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBRPly4tY1nUSIimYn5dvbKuO3ayn8p_4o",
      authDomain: "mukhakmai.firebaseapp.com",
      projectId: "mukhakmai",
      storageBucket: "mukhakmai.firebasestorage.app",
      messagingSenderId: "455973425276",
      appId: "1:455973425276:web:5c8dd4954061ecae52b9f9"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const adminEmail = "ziad95005@gmail.com"; 
    let allQuestions = [], isSubscribed = false;

    onAuthStateChanged(auth, async (user) => {
        if(user) {
            document.getElementById("u-email").innerText = user.email;
            if(user.email === adminEmail) {
                document.getElementById("tab-admin").classList.remove("hidden");
                isSubscribed = true;
            } else {
                const userSnap = await getDoc(doc(db, "users", user.uid));
                isSubscribed = userSnap.data()?.isSubscribed || false;
            }
            document.getElementById("u-sub-status").innerText = isSubscribed ? "نشط ✅" : "غير نشط ❌";
            document.getElementById("logged-in-view").classList.remove("hidden");
            document.getElementById("logged-out-view").classList.add("hidden");
            
            const lastTab = localStorage.getItem('activeTab') || 'home';
            window.switchTab(lastTab);
        } else {
            window.switchTab('auth');
        }
        fetchData();
    });

    async function fetchData() {
        const snap = await getDocs(collection(db, "live_questions"));
        allQuestions = snap.docs.map(d => ({id: d.id, ...d.data()}));
        const hGrid = document.getElementById("home-categories-preview");
        if(hGrid) hGrid.innerHTML = [...new Set(allQuestions.map(q => q.category))].map(cat => `<div class="category-card" onclick="window.checkSubscriptionAndPlay()"><h3>${cat}</h3></div>`).join('');
    }

    window.handleLogin = async () => {
        try { await signInWithEmailAndPassword(auth, document.getElementById("login-email").value, document.getElementById("login-password").value); } catch(e) { alert("خطأ في الدخول"); }
    };
    window.handleSignup = async () => {
        try { 
            const res = await createUserWithEmailAndPassword(auth, document.getElementById("signup-email").value, document.getElementById("signup-password").value);
            await setDoc(doc(db, "users", res.user.uid), { email: res.user.email, isSubscribed: false, playedQuestions: [] });
        } catch(e) { alert("خطأ في التسجيل"); }
    };
    window.handleLogout = () => { signOut(auth); localStorage.clear(); location.reload(); };
    window.toggleAuth = (signup) => {
        document.getElementById("login-form").classList.toggle("hidden", signup);
        document.getElementById("signup-form").classList.toggle("hidden", !signup);
    };

    window.processBulkUpload = async () => {
        const cat = document.getElementById("bulk-cat-name").value.trim();
        const dataStr = document.getElementById("bulk-data").value.trim();
        if(!cat || !dataStr) return;
        try {
            const qs = JSON.parse(dataStr);
            for(const q of qs) {
                await addDoc(collection(db, "live_questions"), {
                    category: cat, points: q.p || 200, question: q.q, correctAnswer: q.a,
                    wrongAnswers: q.w || [], mediaUrl: q.m || "", mediaType: q.m ? "image" : "", timestamp: serverTimestamp()
                });
            }
            alert("تم الرفع ✅"); location.reload();
        } catch(e) { alert("تأكد من صيغة الكود"); }
    };

    window.loadAdminList = async () => {
        const list = document.getElementById("admin-qs-list");
        if(!list) return;
        const categorized = {};
        allQuestions.forEach(q => {
            if(!categorized[q.category]) categorized[q.category] = [];
            categorized[q.category].push(q);
        });
        list.innerHTML = Object.entries(categorized).map(([name, qs]) => `
            <div style="border:1px solid #ddd; padding:12px; border-radius:12px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
                <b>${name} (${qs.length})</b>
                <button onclick="window.openCategoryPreview('${name}')" style="background:var(--primary); color:white; border:none; padding:8px 15px; border-radius:8px;">👁️ معاينة</button>
            </div>
        `).join('');
    };

    window.openCategoryPreview = (catName) => {
        window.switchTab('preview');
        document.getElementById("preview-title").innerText = catName;
        const grid = document.getElementById("preview-questions-grid");
        const filtered = allQuestions.filter(q => q.category === catName);
        grid.innerHTML = filtered.map((q, i) => `
            <div class="auth-box" style="text-align:right; position:relative;">
                <div class="q-number-badge">${i+1}</div>
                <div style="height:100px; background:#f0f0f0; border-radius:10px; margin-bottom:10px; display:flex; justify-content:center; align-items:center; overflow:hidden;">
                    ${q.mediaUrl ? `<img src="${q.mediaUrl}" style="width:100%; height:100%; object-fit:cover;" referrerpolicy="no-referrer">` : '<small>بدون صورة</small>'}
                </div>
                <small style="color:var(--primary)">[${q.points} نقطة]</small>
                <p style="font-weight:bold; margin:5px 0;">${q.question}</p>
                <div style="color:var(--success); font-size:0.9em;">✅ ${q.correctAnswer}</div>
            </div>
        `).join('');
    };

    window.checkSubscriptionAndPlay = () => {
        if(!auth.currentUser) { window.switchTab('auth'); return; }
        if(isSubscribed || auth.currentUser.email === adminEmail) {
            window.switchTab('game');
            window.renderGameCategories();
        } else {
            alert("يجب الاشتراك للعب 💎");
            window.switchTab('auth');
        }
    };

    window.renderGameCategories = async () => {
        const grid = document.getElementById("pro-categories-grid");
        const cats = [...new Set(allQuestions.map(q => q.category))];
        grid.innerHTML = cats.map(cat => `<div class="category-card" onclick="window.toggleCatSelection('${cat}', this)"><h3>${cat}</h3></div>`).join('');
    };

    let selectedCats = [];
    window.toggleCatSelection = (name, el) => {
        const i = selectedCats.indexOf(name);
        if(i > -1) { selectedCats.splice(i,1); el.style.borderColor = "#e2e8f0"; }
        else { if(selectedCats.length < 6) { selectedCats.push(name); el.style.borderColor = "var(--primary)"; } }
        document.getElementById("btn-confirm-categories").classList.toggle("hidden", selectedCats.length < 3);
    };

    window.proceedToSettings = () => {
        document.getElementById("step-select-category").classList.add("hidden");
        document.getElementById("step-game-settings").classList.remove("hidden");
    };
</script>
</body>
</html>
