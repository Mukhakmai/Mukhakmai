<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>مخك معي؟ 🧠</title>
  <link rel="icon" href="favicon.png" type="image/png" />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet" />

  <style>
    :root{
      --primary:#6A2EA0;
      --primary-dark:#4B1E6D;
      --primary-light:#9B4DCA;
      --accent:#FF7A1A;
      --accent-light:#FFA64D;
      --success:#22c55e;
      --danger:#ef4444;
      --warning:#f59e0b;

      --bg-dark:#0f0a1a;
      --panel:#1a0f2e;
      --panel-2:#21113a;
      --card-bg:#ffffff;
      --text-main:#f8fafc;
      --text-dark:#111827;
      --muted:#cbd5e1;
      --border-color:#e5e7eb;
      --nav-bg:rgba(15,10,26,0.92);
      --shadow:0 20px 50px rgba(0,0,0,0.28);
      --soft-shadow:0 8px 24px rgba(0,0,0,0.08);
    }

    *{box-sizing:border-box}
    html,body{
      width:100%;
      margin:0;
      padding:0;
      overflow-x:hidden;
      -webkit-text-size-adjust:100%;
      scroll-behavior:smooth;
    }

    body{
      font-family:'Tajawal',sans-serif;
      color:var(--text-main);
      background:
        radial-gradient(circle at top right, rgba(155,77,202,0.25), transparent 28%),
        radial-gradient(circle at top left, rgba(255,122,26,0.20), transparent 26%),
        linear-gradient(135deg, #0f0a1a, #1a0f2e);
      padding-top:160px;
    }

    img,video{max-width:100%;display:block}
    audio{width:100%}
    .hidden{display:none !important}

    .navbar{
      position:fixed;
      top:0;
      right:0;
      left:0;
      z-index:6000;
      padding:10px 14px;
      display:flex;
      flex-direction:column;
      gap:10px;
      align-items:center;
      background:var(--nav-bg);
      backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(255,255,255,0.08);
      box-shadow:0 10px 30px rgba(0,0,0,0.25);
    }

    .logo{cursor:pointer;display:flex;align-items:center;justify-content:center}
    .logo img{height:40px;width:auto}

    .nav-links{
      width:100%;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .nav-btn,.btn-play-nav,.btn-main,.admin-btn,.tv-btn,.account-tab,.preview-btn{
      border:none;
      border-radius:14px;
      font-family:'Tajawal',sans-serif;
      font-weight:900;
      cursor:pointer;
      transition:transform .18s ease,opacity .18s ease,box-shadow .18s ease,background .18s ease;
    }

    .nav-btn:hover,.btn-play-nav:hover,.btn-main:hover,.admin-btn:hover,.tv-btn:hover,.account-tab:hover,.preview-btn:hover{
      transform:translateY(-2px);
    }

    .nav-btn{
      background:rgba(255,255,255,0.08);
      color:#fff;
      padding:11px 14px;
      min-width:88px;
      flex:1;
      max-width:110px;
    }

    .nav-btn.active{
      background:linear-gradient(135deg,var(--primary),var(--primary-dark));
      color:#fff;
      box-shadow:0 10px 24px rgba(106,46,160,.35);
    }

    .btn-play-nav{
      width:100%;
      max-width:420px;
      padding:14px 22px;
      color:#2d1807;
      background:linear-gradient(135deg,var(--accent),var(--accent-light));
      box-shadow:0 10px 24px rgba(255,122,26,.25);
    }

    .container{
      width:100%;
      max-width:1400px;
      margin:0 auto;
      padding:14px;
    }

    .fade-in{animation:fadeIn .35s ease}
    @keyframes fadeIn{
      from{opacity:0;transform:translateY(10px)}
      to{opacity:1;transform:translateY(0)}
    }

    .auth-box,.admin-card,.admin-header-card{
      background:rgba(255,255,255,0.98);
      color:var(--text-dark);
      border:1px solid rgba(255,255,255,0.4);
      border-radius:24px;
      box-shadow:var(--soft-shadow);
      padding:18px;
      margin-bottom:16px;
    }

    .auth-box h2,.auth-box h3,.auth-box h4,.admin-card h3,.admin-header-card h2{
      margin-top:0;
    }

    input,textarea,select{
      width:100%;
      min-height:48px;
      padding:14px;
      margin:0;
      border:2px solid #e2e8f0;
      border-radius:14px;
      font-family:'Tajawal',sans-serif;
      font-size:16px;
      background:#fff;
      color:#111827;
      outline:none;
    }

    textarea{resize:vertical}
    input:focus,textarea:focus,select:focus{
      border-color:var(--primary-light);
      box-shadow:0 0 0 4px rgba(155,77,202,.12);
    }

    .btn-main{
      width:100%;
      min-height:48px;
      color:#fff;
      padding:14px 18px;
    }

    .btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-dark))}
    .btn-orange{background:linear-gradient(135deg,var(--accent),var(--accent-light));color:#2d1807}
    .btn-green{background:linear-gradient(135deg,#22c55e,#16a34a)}
    .btn-danger{background:linear-gradient(135deg,#ef4444,#dc2626)}
    .btn-gray{background:linear-gradient(135deg,#64748b,#475569)}

    .categories-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
      gap:14px;
    }

    .category-tile{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
      cursor:pointer;
    }

    .category-box{
      position:relative;
      width:100%;
      aspect-ratio:1/1;
      border-radius:22px;
      background:linear-gradient(180deg,#1a0f2e,#0f0a1a);
      border:1px solid rgba(155,77,202,.28);
      box-shadow:0 12px 30px rgba(0,0,0,.22);
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:16px;
      transition:transform .18s ease,border-color .18s ease,box-shadow .18s ease;
    }

    .category-box:hover{
      transform:translateY(-4px);
      border-color:rgba(255,122,26,.55);
      box-shadow:0 16px 34px rgba(0,0,0,.28);
    }

    .category-thumb{
      width:70px;
      height:70px;
      border-radius:20px;
      background:linear-gradient(135deg,rgba(106,46,160,.9),rgba(255,122,26,.8));
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      font-size:1.5rem;
      font-weight:900;
      box-shadow:0 12px 26px rgba(0,0,0,.22);
    }

    .category-name{
      color:#fff;
      font-weight:900;
      text-align:center;
      line-height:1.5;
      word-break:break-word;
    }

    .play-count-badge{
      position:absolute;
      top:10px;
      left:10px;
      min-width:34px;
      height:34px;
      padding:0 10px;
      border-radius:999px;
      background:linear-gradient(135deg,var(--accent),var(--accent-light));
      color:#1a0f2e;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:900;
      box-shadow:0 8px 18px rgba(255,122,26,.28);
    }

    .play-count-badge.zero{
      background:linear-gradient(135deg,#64748b,#475569);
      color:#fff;
    }

    .disabled-cat{
      opacity:.45;
      pointer-events:none;
    }

    .account-shell{max-width:720px;margin:0 auto}
    .account-tabs{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
    .account-tab{
      flex:1;
      min-height:48px;
      background:#e2e8f0;
      color:#1e293b;
    }
    .account-tab.active{
      background:linear-gradient(135deg,var(--primary),var(--primary-dark));
      color:#fff;
    }

    .account-info-card{
      background:#f8fafc;
      border:1px solid #e5e7eb;
      border-radius:18px;
      padding:18px;
      text-align:right;
      margin-bottom:16px;
    }

    .account-info-card p{margin:10px 0}
    .account-actions{display:flex;flex-direction:column;gap:10px}

    .admin-shell{width:100%;max-width:1400px;margin:0 auto}
    .admin-header-card{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
    }
    .admin-top-actions,.admin-form-actions,.preview-nav-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .admin-grid{
      display:grid;
      grid-template-columns:minmax(0,1.2fr) minmax(300px,.8fr);
      gap:16px;
      align-items:start;
    }
    .admin-main-col,.admin-side-col{min-width:0}
    .sticky-card{position:sticky;top:105px}
    .admin-form-grid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:12px;
      margin-bottom:12px;
    }
    .admin-form-grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}
    .admin-form-row.single{margin-bottom:12px}
    .admin-btn{
      min-height:46px;
      padding:12px 18px;
      color:#fff;
      box-shadow:0 10px 24px rgba(0,0,0,.14);
    }
    .admin-btn.primary{background:linear-gradient(135deg,var(--primary),var(--primary-dark))}
    .admin-btn.orange{background:linear-gradient(135deg,var(--accent),var(--accent-light));color:#2d1807}
    .admin-btn.green{background:linear-gradient(135deg,#22c55e,#16a34a)}
    .admin-btn.red{background:linear-gradient(135deg,#ef4444,#dc2626)}
    .admin-btn.gray{background:linear-gradient(135deg,#64748b,#475569)}

    .admin-section-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:12px;
    }

    .admin-categories-list{
      display:flex;
      flex-direction:column;
      gap:10px;
      max-height:70vh;
      overflow:auto;
      padding-right:2px;
    }

    .admin-category-card{
      border:1px solid #e5e7eb;
      border-radius:16px;
      padding:14px;
      background:#fff;
    }

    .admin-category-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .admin-category-meta{
      font-size:.92rem;
      color:#666;
      margin-top:6px;
    }

    .admin-question-card{
      border:1px solid #e5e7eb;
      border-radius:18px;
      padding:16px;
      margin-bottom:12px;
      background:#fff;
    }

    .admin-question-wrap{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:14px;
      flex-wrap:wrap;
    }

    .admin-question-content{flex:1;min-width:0}
    .admin-question-actions{
      display:flex;
      flex-direction:column;
      gap:8px;
      min-width:140px;
    }

    .admin-badge-line{
      font-weight:900;
      color:var(--primary);
      margin-bottom:8px;
    }

    .admin-media-preview{
      margin-top:12px;
      border-radius:16px;
      overflow:hidden;
      background:#f8fafc;
      border:1px solid #e5e7eb;
      padding:10px;
    }

    .admin-check-row{
      display:flex;
      align-items:center;
      gap:8px;
      margin:12px 0;
      color:#111827;
      font-weight:700;
    }

    .preview-btn{
      background:linear-gradient(135deg,#0ea5e9,#0284c7);
      color:#fff;
      padding:12px 18px;
      min-height:46px;
    }

    .modal-overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.72);
      z-index:9999;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:14px;
    }

    .modal-content{
      background:#fff;
      color:#111827;
      border-radius:24px;
      width:100%;
      max-width:720px;
      max-height:90vh;
      overflow-y:auto;
      padding:20px;
    }

    .tv-shell{
      max-width:1400px;
      margin:0 auto;
      padding:0;
    }

    .tv-topbar{
      display:grid;
      grid-template-columns:1fr auto 1fr;
      gap:14px;
      align-items:stretch;
      margin-bottom:18px;
    }

    .team-score-card{
      background:linear-gradient(180deg,#1a0f2e,#0f0a1a);
      border:1px solid rgba(155,77,202,.3);
      border-radius:24px;
      padding:20px;
      text-align:center;
      box-shadow:var(--shadow);
    }

    .team-name{
      font-size:1.35rem;
      font-weight:900;
      margin-bottom:8px;
    }

    .team-score{
      font-size:3rem;
      line-height:1;
      font-weight:900;
      color:var(--accent-light);
    }

    .team-powers{
      font-size:.95rem;
      color:var(--muted);
      min-height:24px;
    }

    .center-status{
      min-width:220px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:10px;
      align-items:center;
      background:linear-gradient(180deg,rgba(106,46,160,.28),rgba(17,24,39,.95));
      border:1px solid rgba(106,46,160,.25);
      border-radius:24px;
      padding:20px;
      box-shadow:var(--shadow);
    }

    .round-label{
      font-weight:800;
      color:var(--muted);
    }

    .timer-big{
      font-size:4rem;
      line-height:1;
      font-weight:900;
      color:#fff;
      text-shadow:0 0 20px rgba(155,77,202,.6);
    }

    .phase-badge{
      background:rgba(255,255,255,.08);
      color:#fff;
      border-radius:999px;
      padding:8px 16px;
      font-weight:800;
      border:1px solid rgba(255,255,255,.08);
    }

    .phase-badge.phase-special{
      background:linear-gradient(135deg,var(--accent),var(--accent-light));
      color:#1a0f2e;
      border:none;
      box-shadow:0 8px 18px rgba(255,122,26,.25);
    }

    .tv-board-columns{
      display:grid;
      gap:16px;
    }
    .tv-board-3{grid-template-columns:repeat(3,1fr)}
    .tv-board-4{grid-template-columns:repeat(4,1fr)}
    .tv-board-5{grid-template-columns:repeat(5,1fr)}
    .tv-board-6{grid-template-columns:repeat(6,1fr)}

    .tv-category-column{
      background:linear-gradient(180deg,rgba(30,41,59,.90),rgba(17,24,39,.95));
      border:1px solid rgba(255,255,255,.08);
      border-radius:24px;
      overflow:hidden;
      box-shadow:var(--shadow);
    }

    .tv-category-header{
      background:linear-gradient(135deg,var(--primary),var(--primary-dark));
      color:#fff;
      min-height:90px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-weight:900;
      font-size:1.15rem;
      padding:12px;
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    .tv-question-cell{
      width:100%;
      border:none;
      border-bottom:1px solid rgba(255,255,255,.06);
      background:
        linear-gradient(180deg, rgba(255,122,26,.15), transparent),
        rgba(20,10,40,.9);
      color:var(--accent-light);
      font-size:2rem;
      font-weight:900;
      padding:28px 8px;
      cursor:pointer;
      transition:transform .18s ease,background .18s ease,opacity .18s ease;
      font-family:'Tajawal',sans-serif;
    }

    .tv-question-cell:hover{
      transform:scale(1.02);
      background:
        linear-gradient(180deg, rgba(255,122,26,.3), transparent),
        rgba(20,10,40,1);
    }

    .tv-question-cell.used{
      opacity:.25;
      pointer-events:none;
      text-decoration:line-through;
    }

    .tv-question-cell:last-child{border-bottom:none}

    .tv-question-stage{display:grid;gap:18px}

    .question-hero{
      min-height:320px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:30px;
      background:
        radial-gradient(circle, rgba(155,77,202,.2), transparent),
        linear-gradient(180deg, #1a0f2e, #0f0a1a);
      border:1px solid rgba(155,77,202,.2);
      border-radius:30px;
      box-shadow:var(--shadow);
    }

    .question-meta{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
      margin-bottom:18px;
    }

    .meta-chip{
      background:rgba(255,255,255,.08);
      color:var(--muted);
      border:1px solid rgba(255,255,255,.08);
      padding:8px 14px;
      border-radius:999px;
      font-size:.95rem;
      font-weight:800;
    }

    .question-text-tv{
      font-size:clamp(1.5rem,2.8vw,2.5rem);
      line-height:1.8;
      font-weight:900;
      max-width:1000px;
    }

    .question-image-tv{
      margin-top:20px;
      max-width:420px;
      width:100%;
      border-radius:22px;
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 20px 40px rgba(0,0,0,.25);
    }

    .answers-tv{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:14px;
      margin-top:20px;
      width:100%;
      max-width:1000px;
    }

    .answer-tv{
      background:linear-gradient(180deg,rgba(30,41,59,1),rgba(17,24,39,1));
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:18px;
      font-size:1.2rem;
      font-weight:800;
      color:#fff;
    }

    .answer-tv.correct-glow{
      border-color:rgba(34,197,94,.6);
      box-shadow:0 0 20px rgba(34,197,94,.25);
    }

    .control-deck{display:grid;gap:14px}
    .control-row{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}

    .tv-btn{
      min-width:140px;
      padding:14px 18px;
      color:#fff;
      font-size:1rem;
      box-shadow:0 10px 24px rgba(0,0,0,.22);
    }
    .tv-btn:disabled{opacity:.45;cursor:not-allowed}
    .tv-btn-blue{background:linear-gradient(135deg,var(--primary),var(--primary-dark))}
    .tv-btn-gold{background:linear-gradient(135deg,var(--accent),var(--accent-light));color:#2d1807}
    .tv-btn-red{background:linear-gradient(135deg,#ef4444,#dc2626)}
    .tv-btn-green{background:linear-gradient(135deg,#22c55e,#16a34a)}
    .tv-btn-gray{background:linear-gradient(135deg,#64748b,#475569)}
    .tv-btn-purple{background:linear-gradient(135deg,#8b5cf6,#7c3aed)}

    .result-picker{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:14px;
    }

    .winner-screen{
      min-height:60vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .winner-card{
      width:100%;
      max-width:900px;
      text-align:center;
      padding:50px 30px;
      background:
        radial-gradient(circle at top, rgba(255,122,26,.25), transparent),
        linear-gradient(180deg, #1a0f2e, #0f0a1a);
      border:1px solid rgba(255,122,26,.3);
      border-radius:36px;
      box-shadow:var(--shadow);
    }

    .winner-title{
      font-size:1.4rem;
      color:var(--muted);
      margin-bottom:14px;
      font-weight:800;
    }

    .winner-name{
      font-size:clamp(2rem,5vw,4.5rem);
      color:var(--accent-light);
      font-weight:900;
      margin-bottom:14px;
    }

    .winner-score{
      font-size:2rem;
      font-weight:900;
      color:#fff;
    }

    .power-bar{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:center;
      margin-top:8px;
    }

    .power-pill{
      background:rgba(255,255,255,.08);
      color:var(--muted);
      padding:8px 12px;
      border-radius:999px;
      font-size:.9rem;
      border:1px solid rgba(255,255,255,.08);
    }

    .power-pill.used{
      opacity:.35;
      text-decoration:line-through;
    }

    @keyframes boardIn{
      from{opacity:0;transform:translateY(20px) scale(.985)}
      to{opacity:1;transform:translateY(0) scale(1)}
    }
    @keyframes questionPop{
      0%{opacity:0;transform:scale(.92)}
      70%{opacity:1;transform:scale(1.02)}
      100%{opacity:1;transform:scale(1)}
    }
    @keyframes glowPulse{
      0%{box-shadow:0 0 0 rgba(255,122,26,0)}
      50%{box-shadow:0 0 30px rgba(255,122,26,.35)}
      100%{box-shadow:0 0 0 rgba(255,122,26,0)}
    }
    @keyframes timerAlert{
      0%{transform:scale(1)}
      25%{transform:scale(1.08)}
      50%{transform:scale(.96)}
      75%{transform:scale(1.08)}
      100%{transform:scale(1)}
    }
    @keyframes answerReveal{
      from{opacity:0;transform:translateY(16px)}
      to{opacity:1;transform:translateY(0)}
    }
    @keyframes winnerZoom{
      0%{opacity:0;transform:scale(.85)}
      60%{opacity:1;transform:scale(1.05)}
      100%{opacity:1;transform:scale(1)}
    }
    @keyframes shimmerSweep{
      0%{transform:translateX(-140%)}
      100%{transform:translateX(140%)}
    }

    .board-animate{animation:boardIn .45s ease}
    .question-animate{animation:questionPop .45s ease}
    .answer-reveal-animate{animation:answerReveal .35s ease}
    .winner-animate{animation:winnerZoom .7s ease}
    .timer-danger{animation:timerAlert .7s ease infinite;color:var(--accent-light)!important}
    .flash-score{animation:questionPop .35s ease}

    .tv-question-cell.selected{
      position:relative;
      overflow:hidden;

function startTimer(seconds) {
  clearInterval(timer);
  timeLeft = seconds;
  setTimerValue(timeLeft);

  timer = setInterval(() => {
    timeLeft--;
    setTimerValue(timeLeft);
    playSound("tick");

    if (timeLeft <= 0) {
      clearInterval(timer);
      playSound("timeup");

      if (timeLeft === 0) {
        // انتقال للخصم
        setPhase("دور الخصم");
        startTimer(30);
      }
    }
  }, 1000);
}

window.revealAnswer = () => {
  clearInterval(timer);

  const box = document.getElementById("answer-box");
  if (!box) return;

  box.innerHTML = `
    <div style="font-size:1.2rem;font-weight:bold;">
      ${escapeHtml(currentQ.correctAnswer)}
    </div>
  `;
  box.classList.remove("hidden");

  animateAnswerBox();
  playSound("reveal");
};

window.awardPoints = (team) => {
  if (!currentQ) return;

  let pts = Number(currentQ.points) || 0;

  if (doubleActive === team) {
    pts *= 2;
    doubleActive = null;
  }

  if (team === "A") scores.A += pts;
  if (team === "B") scores.B += pts;

  updateTvHeader();
  flashScore(team);
  playSound("correct");

  finishQuestion();
};

window.noAnswer = () => {
  playSound("wrong");
  finishQuestion();
};

function finishQuestion() {
  if (currentCellBtn) {
    currentCellBtn.classList.add("used");
    currentCellBtn.disabled = true;
  }

  currentQ = null;
  currentCellBtn = null;

  if (isBoardFinished()) {
    endGame();
  } else {
    window.switchTab("board");
    setPhase("اختر سؤال");
    setTimerValue("--");
  }
}

function endGame() {
  const winner =
    scores.A > scores.B ? teams.A :
    scores.B > scores.A ? teams.B :
    "تعادل";

  document.getElementById("winner-text").innerText = winner;

  animateWinnerCard();
  playSound("winner");

  window.switchTab("winner");
}

/* ========= POWERS ========= */

window.useDouble = (team) => {
  if (team === "A" && usedPowers.doubleA) return;
  if (team === "B" && usedPowers.doubleB) return;

  if (team === "A") usedPowers.doubleA = true;
  if (team === "B") usedPowers.doubleB = true;

  doubleActive = team;

  renderPowerBars();
  playSound("power");
};

window.useBlock = (team) => {
  if (team === "A" && usedPowers.blockA) return;
  if (team === "B" && usedPowers.blockB) return;

  if (team === "A") usedPowers.blockA = true;
  if (team === "B") usedPowers.blockB = true;

  blockedOpponent = team === "A" ? "B" : "A";

  renderPowerBars();
  playSound("power");
};

window.useCallFriend = () => {
  if (usedPowers.call) return;

  usedPowers.call = true;
  document.getElementById("power-call").disabled = true;

  alert("اتصال بصديق لمدة 30 ثانية");
  playSound("power");
};

window.useSearch = () => {
  if (usedPowers.search) return;

  usedPowers.search = true;
  document.getElementById("power-search").disabled = true;

  alert("بحث مسموح لمدة 15 ثانية");
  playSound("power");
};

window.useSkip = () => {
  if (usedPowers.skip) return;

  usedPowers.skip = true;
  document.getElementById("power-skip").disabled = true;

  const randomQ = shuffleArray(allQuestions)[0];
  if (!randomQ) return;

  currentQ = randomQ;
  document.getElementById("game-question").innerText = randomQ.question;

  renderQuestionMedia(randomQ);

  playSound("power");
};
