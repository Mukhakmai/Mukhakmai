<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مخك معي؟ 🧠</title>
    
    <link rel="icon" href="favicon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #8e44ad; --secondary: #f39c12; --success: #27ae60; --danger: #e74c3c; 
            --bg-color: #f8fafc; --card-bg: #ffffff; --text-main: #2c3e50; 
            --border-color: #e2e8f0; --nav-bg: #ffffff;
        }

        html, body { width: 100%; overflow-x: hidden; margin: 0; padding: 0; -webkit-text-size-adjust: 100%; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg-color); color: var(--text-main); padding-top: 140px; transition: 0.3s; }

        /* Navbar */
        .navbar { 
            background: var(--nav-bg); 
            box-shadow: 0 2px 15px rgba(0,0,0,0.1); 
            position: fixed; top: 0; width: 100%; z-index: 9999; 
            padding: 10px; box-sizing: border-box; 
            display: flex; flex-direction: column; align-items: center; gap: 10px; 
        }
        .logo img { height: 40px; width: auto; }
        .nav-links { display: flex; gap: 5px; width: 100%; justify-content: center; flex-wrap: wrap; }
        .nav-btn { 
            background: #f1f5f9; border: none; font-family: 'Tajawal'; font-weight: 700; 
            cursor: pointer; padding: 8px 12px; border-radius: 10px; color: var(--text-main); 
            font-size: 0.85em; flex: 1; max-width: 90px; text-align: center;
        }
        .nav-btn.active { background: var(--primary); color: white; }
        .btn-play-nav { 
            background: linear-gradient(45deg, var(--secondary), #d35400); 
            color: white !important; border-radius: 15px; width: 90%; padding: 12px; 
            font-weight: 900; border: none; cursor: pointer; text-align: center;
        }

        @media (min-width: 768px) {
            body { padding-top: 100px; }
            .navbar { flex-direction: row; padding: 10px 40px; height: 80px; justify-content: space-between; }
            .logo { width: auto; }
            .nav-links { width: auto; gap: 15px; }
            .btn-play-nav { width: auto; padding: 10px 30px; }
        }

        @media (max-width: 600px) {
            body { padding-top: 220px !important; }
        }

        .container { width: 100%; max-width: 800px; margin: 0 auto; padding: 15px; box-sizing: border-box; }
        .hidden { display: none !important; }
        
        .auth-box { 
            background: var(--card-bg); padding: 20px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid var(--border-color); 
            text-align: center; margin-bottom: 20px; width: 100%; box-sizing: border-box;
        }

        /* شاشة المعاينة والبطاقات */
        .preview-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 600px) { .preview-grid { grid-template-columns: 1fr 1fr; } }

        .preview-card { 
            background: var(--card-bg); border-radius: 15px; border: 1px solid var(--border-color); 
            position: relative; overflow: hidden; display: flex; flex-direction: column; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: right;
        }

        .q-number-badge { 
            position: absolute; top: 10px; left: 10px; background: var(--primary); 
            color: white; width: 28px; height: 28px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 800; font-size: 0.9em; z-index: 10; border: 2px solid white; 
        }

        .preview-img-container { height: 130px; background: #f1f5f9; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .preview-img-container img { width: 100%; height: 100%; object-fit: cover; }

        .preview-content { padding: 15px; flex-grow: 1; }
        .preview-actions { 
            display: flex; gap: 8px; padding: 10px 15px; 
            background: #f8fafc; border-top: 1px solid var(--border-color); 
        }

        .btn-action { 
            flex: 1; padding: 10px; border: none; border-radius: 10px; 
            cursor: pointer; color: white; font-weight: bold; font-family: 'Tajawal';
        }

        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; display: flex; justify-content: center; align-items: center; padding: 15px; box-sizing: border-box; }
        .modal-content { background: var(--card-bg); padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; position: relative; }

        input, select, textarea { width: 100%; padding: 14px; margin: 8px 0; border: 2px solid #e2e8f0; border-radius: 12px; font-family: 'Tajawal'; font-size: 16px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 16px; font-weight: 900; border: none; border-radius: 15px; cursor: pointer; color: white; margin-top: 10px; font-family: 'Tajawal'; font-size: 1.1em; }
        
        .categories-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    </style>

    <script>
        window.switchTab = (tabId) => {
            const containers = document.querySelectorAll('.container');
            containers.forEach(c => c.classList.add('hidden'));
            const btns = document.querySelectorAll('.nav-btn');
            btns.forEach(b => b.classList.remove('active'));
            const target = document.getElementById(`view-${tabId}`);
            if(target) {
                target.classList.remove('hidden');
                localStorage.setItem('activeTab', tabId);
                window.scrollTo(0,0);
            }
            const activeBtn = document.getElementById(`tab-${tabId}`);
            if(activeBtn) activeBtn.classList.add('active');
        };
    </script>
</head>
<body>

<nav class="navbar">
    <div class="logo" onclick="window.switchTab('home')" style="cursor: pointer;">
        <img src="logo-clean.png" alt="مخك معي">
    </div>
    <div class="nav-links">
        <button class="nav-btn" id="tab-home" onclick="window.switchTab('home')">الرئيسية</button>
        <button class="nav-btn hidden" id="tab-admin" onclick="window.switchTab('admin')">الإدارة</button>
        <button class="nav-btn" id="tab-auth" onclick="window.switchTab('auth')">حسابي</button>
    </div>
    <button class="btn-play-nav" onclick="window.checkSubscriptionAndPlay()">العب الآن 🚀</button>
</nav>

<div id="view-home" class="container fade-in">
    <div class="categories-grid" id="home-categories-preview"></div>
</div>

<div id="view-auth" class="container hidden fade-in">
    <div class="auth-box" id="logged-out-view">
        <h3>تسجيل الدخول 👋</h3>
        <div id="login-form">
            <input type="email" id="login-email" placeholder="البريد الإلكتروني">
            <input type="password" id="login-password" placeholder="كلمة المرور">
            <button class="btn-main" style="background:var(--primary)" onclick="window.handleLogin()">دخول</button>
            <p>سجل حساب جديد <a href="#" onclick="window.toggleAuth(true)">من هنا</a></p>
        </div>
        <div id="signup-form" class="hidden">
            <input type="email" id="signup-email" placeholder="البريد الإلكتروني">
            <input type="password" id="signup-password" placeholder="كلمة المرور">
            <button class="btn-main" style="background:var(--secondary)" onclick="window.handleSignup()">إنشاء الحساب</button>
            <p>عندك حساب؟ <a href="#" onclick="window.toggleAuth(false)">دخول</a></p>
        </div>
    </div>
    <div class="auth-box hidden" id="logged-in-view">
        <div style="background:#f8fafc; border:1px solid #eee; border-radius:15px; padding:20px; text-align:right; margin-bottom:20px;">
            <p><b>البريد:</b> <span id="u-email" style="word-break:break-all;"></span></p>
            <p><b>الاشتراك:</b> <span id="u-sub-status">...</span></p>
        </div>
        <button class="btn-main" style="background:var(--danger)" onclick="window.handleLogout()">تسجيل الخروج 🚪</button>
    </div>
</div>

<div id="view-game" class="container hidden fade-in">
    <div id="step-select-category">
        <h3 style="text-align: center;">اختر الفئات</h3>
        <div class="categories-grid" id="pro-categories-grid"></div>
        <button id="btn-confirm-categories" class="btn-main hidden" style="background:var(--secondary)" onclick="window.proceedToSettings()">متابعة ➡️</button>
    </div>
    <div id="step-game-settings" class="hidden">
        <div class="auth-box">
            <input type="text" id="team1-name-input" placeholder="اسم الفريق 1">
            <input type="text" id="team2-name-input" placeholder="اسم الفريق 2">
            <button class="btn-main" style="background:var(--primary)" onclick="window.finalizeSetupAndPlay()">ابدأ اللعب 🚀</button>
        </div>
    </div>
</div>

<div id="view-admin" class="container hidden fade-in">
    <div class="auth-box">
        <h4>📁 الإدارة والرفع</h4>
        <input type="text" id="bulk-cat-name" placeholder="اسم الفئة">
        <textarea id="bulk-data" rows="4" placeholder='الصق الكود هنا...'></textarea>
        <button class="btn-main" style="background:#27ae60;" onclick="window.processBulkUpload()">رفع الأسئلة ✅</button>
    </div>
    <div class="auth-box"><h4>📋 القائمة</h4><div id="admin-qs-list"></div></div>
</div>

<div id="view-preview" class="container hidden fade-in">
    <div class="auth-box" style="display:flex; justify-content:space-between; align-items:center; padding:15px;">
        <b id="preview-title">...</b>
        <button class="nav-btn" style="background:var(--danger); color:white; max-width:none;" onclick="window.switchTab('admin')">إغلاق ✖️</button>
    </div>
    <div id="preview-questions-grid" class="preview-grid"></div>
</div>

<div id="edit-modal" class="modal-overlay hidden">
    <div class="modal-content">
        <h3 style="margin-top:0">✏️ تعديل السؤال</h3>
        <input type="hidden" id="edit-q-id">
        <select id="edit-q-pts"><option value="200">200</option><option value="400">400</option><option value="600">600</option></select>
        <textarea id="edit-q-text" rows="3" placeholder="نص السؤال"></textarea>
        <input type="text" id="edit-q-correct" placeholder="الإجابة الصح">
        <input type="text" id="edit-q-wrongs" placeholder="خطأ 1 | خطأ 2">
        <input type="text" id="edit-q-url" placeholder="رابط الصورة (.jpg)">
        <button class="btn-main" style="background:var(--success);" onclick="window.saveEditedQuestion()">حفظ ✅</button>
        <button class="btn-main" style="background:var(--danger);" onclick="document.getElementById('edit-modal').classList.add('hidden')">إلغاء</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, getDoc, setDoc, updateDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBRPly4tY1nUSIimYn5dvbKuO3ayn8p_4o",
      authDomain: "mukhakmai.firebaseapp.com",
      projectId: "mukhakmai",
      storageBucket: "mukhakmai.firebasestorage.app",
      messagingSenderId: "455973425276",
      appId: "1:455973425276:web:5c8dd4954061ecae52b9f9"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const adminEmail = "ziad95005@gmail.com"; 
    let allQuestions = [], isSubscribed = false, currentPreviewCat = "";

    onAuthStateChanged(auth, async (user) => {
        if(user) {
            document.getElementById("u-email").innerText = user.email;
            if(user.email === adminEmail) {
                document.getElementById("tab-admin").classList.remove("hidden");
                isSubscribed = true;
            } else {
                const userSnap = await getDoc(doc(db, "users", user.uid));
                isSubscribed = userSnap.data()?.isSubscribed || false;
            }
            document.getElementById("u-sub-status").innerText = isSubscribed ? "نشط ✅" : "غير نشط ❌";
            document.getElementById("logged-in-view").classList.remove("hidden");
            document.getElementById("logged-out-view").classList.add("hidden");
            
            const lastTab = localStorage.getItem('activeTab') || 'home';
            window.switchTab(lastTab);
        } else {
            window.switchTab('auth');
        }
        fetchData();
    });

    async function fetchData() {
        const snap = await getDocs(collection(db, "live_questions"));
        allQuestions = snap.docs.map(d => ({id: d.id, ...d.data()}));
        const hGrid = document.getElementById("home-categories-preview");
        if(hGrid) hGrid.innerHTML = [...new Set(allQuestions.map(q => q.category))].map(cat => `<div class="category-card" onclick="window.checkSubscriptionAndPlay()"><h3>${cat}</h3></div>`).join('');
    }

    window.handleLogin = async () => {
        try { await signInWithEmailAndPassword(auth, document.getElementById("login-email").value, document.getElementById("login-password").value); } catch(e) { alert("خطأ"); }
    };
    window.handleSignup = async () => {
        try { 
            const res = await createUserWithEmailAndPassword(auth, document.getElementById("signup-email").value, document.getElementById("signup-password").value);
            await setDoc(doc(db, "users", res.user.uid), { email: res.user.email, isSubscribed: false, playedQuestions: [] });
        } catch(e) { alert("خطأ"); }
    };
    window.handleLogout = () => { signOut(auth); localStorage.clear(); location.reload(); };
    window.toggleAuth = (signup) => {
        document.getElementById("login-form").classList.toggle("hidden", signup);
        document.getElementById("signup-form").classList.toggle("hidden", !signup);
    };

    window.processBulkUpload = async () => {
        const cat = document.getElementById("bulk-cat-name").value.trim();
        const dataStr = document.getElementById("bulk-data").value.trim();
        if(!cat || !dataStr) return;
        try {
            const qs = JSON.parse(dataStr);
            for(const q of qs) {
                await addDoc(collection(db, "live_questions"), {
                    category: cat, points: q.p || 200, question: q.q, correctAnswer: q.a,
                    wrongAnswers: q.w || [], mediaUrl: q.m || "", mediaType: q.m ? "image" : "", timestamp: serverTimestamp()
                });
            }
            alert("تم ✅"); location.reload();
        } catch(e) { alert("تأكد من JSON"); }
    };

    window.loadAdminList = async () => {
        const list = document.getElementById("admin-qs-list");
        if(!list) return;
        const categorized = {};
        allQuestions.forEach(q => {
            if(!categorized[q.category]) categorized[q.category] = [];
            categorized[q.category].push(q);
        });
        list.innerHTML = Object.entries(categorized).map(([name, qs]) => `
            <div style="border:1px solid #ddd; padding:10px; border-radius:12px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
                <b>${name} (${qs.length})</b>
                <button onclick="window.openCategoryPreview('${name}')" style="background:var(--primary); color:white; border:none; padding:8px 15px; border-radius:8px;">👁️ معاينة</button>
            </div>
        `).join('');
    };

    // الدالة المصلحة بالكامل (إضافة الأزرار)
    window.openCategoryPreview = (catName) => {
        currentPreviewCat = catName;
        window.switchTab('preview');
        document.getElementById("preview-title").innerText = catName;
        const grid = document.getElementById("preview-questions-grid");
        const filtered = allQuestions.filter(q => q.category === catName);
        
        grid.innerHTML = filtered.map((q, i) => `
            <div class="preview-card">
                <div class="q-number-badge">${i+1}</div>
                <div class="preview-img-container">
                    ${q.mediaUrl ? `<img src="${q.mediaUrl}" referrerpolicy="no-referrer">` : '<small>بدون صورة</small>'}
                </div>
                <div class="preview-content">
                    <small style="color:var(--primary)">[${q.points} نقطة]</small>
                    <p style="font-weight:bold; margin:5px 0;">${q.question}</p>
                    <div style="color:var(--success); font-size:0.9em;">✅ ${q.correctAnswer}</div>
                </div>
                <div class="preview-actions">
                    <button class="btn-action" style="background:#3498db;" onclick="window.openEditModal('${q.id}')">✏️ تعديل</button>
                    <button class="btn-action" style="background:var(--danger);" onclick="window.delQ('${q.id}')">🗑️ حذف</button>
                </div>
            </div>
        `).join('');
    };

    window.refreshCategoryPreview = async () => {
        const snap = await getDocs(collection(db, "live_questions"));
        allQuestions = snap.docs.map(d => ({id: d.id, ...d.data()}));
        window.openCategoryPreview(currentPreviewCat);
    };

    window.openEditModal = (id) => {
        const q = allQuestions.find(x => x.id === id);
        document.getElementById("edit-q-id").value = id;
        document.getElementById("edit-q-pts").value = q.points;
        document.getElementById("edit-q-text").value = q.question;
        document.getElementById("edit-q-correct").value = q.correctAnswer;
        document.getElementById("edit-q-wrongs").value = q.wrongAnswers?.join(" | ") || "";
        document.getElementById("edit-q-url").value = q.mediaUrl || "";
        document.getElementById("edit-modal").classList.remove("hidden");
    };

    window.saveEditedQuestion = async () => {
        try {
            const id = document.getElementById("edit-q-id").value;
            const url = document.getElementById("edit-q-url").value.trim();
            await updateDoc(doc(db, "live_questions", id), {
                points: parseInt(document.getElementById("edit-q-pts").value),
                question: document.getElementById("edit-q-text").value,
                correctAnswer: document.getElementById("edit-q-correct").value,
                wrongAnswers: document.getElementById("edit-q-wrongs").value.split("|").map(s=>s.trim()),
                mediaUrl: url, mediaType: url ? "image" : ""
            });
            document.getElementById("edit-modal").classList.add("hidden");
            window.refreshCategoryPreview();
        } catch(e) { alert("خطأ في الحفظ"); }
    };

    window.delQ = async (id) => { if(confirm("حذف؟")) { await deleteDoc(doc(db, "live_questions", id)); window.refreshCategoryPreview(); }};

    window.checkSubscriptionAndPlay = () => {
        if(!auth.currentUser) { window.switchTab('auth'); return; }
        if(isSubscribed || auth.currentUser.email === adminEmail) {
            window.switchTab('game');
            window.renderGameCategories();
        } else {
            alert("يجب الاشتراك للعب 💎");
            window.switchTab('auth');
        }
    };

    window.renderGameCategories = async () => {
        const grid = document.getElementById("pro-categories-grid");
        const cats = [...new Set(allQuestions.map(q => q.category))];
        grid.innerHTML = cats.map(cat => `<div class="category-card" onclick="window.toggleCatSelection('${cat}', this)"><h3>${cat}</h3></div>`).join('');
    };

    let selectedCats = [];
    window.toggleCatSelection = (name, el) => {
        const i = selectedCats.indexOf(name);
        if(i > -1) { selectedCats.splice(i,1); el.style.borderColor = "#e2e8f0"; }
        else { if(selectedCats.length < 6) { selectedCats.push(name); el.style.borderColor = "var(--primary)"; } }
        document.getElementById("btn-confirm-categories").classList.toggle("hidden", selectedCats.length < 3);
    };

    window.proceedToSettings = () => {
        document.getElementById("step-select-category").classList.add("hidden");
        document.getElementById("step-game-settings").classList.remove("hidden");
    };
</script>
</body>
</html>
